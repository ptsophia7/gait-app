<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 專業步態分析</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        /* 修正整體高度邏輯 */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: #000; 
            color: white; 
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 錄影畫面區：確保至少佔據 50% 的空間 */
        #container { 
            position: relative; 
            flex: 1 1 50%; 
            width: 100vw; 
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }

        .timer-overlay { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(0,0,0,0.7); 
            padding: 10px; 
            border-radius: 8px; 
            font-family: monospace; 
            font-size: 1rem; 
            border: 2px solid #34c759; 
            z-index: 100; 
        }

        /* 按鈕與報告區：佔據剩餘空間，並處理 iOS 安全區域 */
        .controls { 
            flex: 0 0 auto;
            background: #1c1c1e; 
            padding: 15px 20px;
            padding-bottom: calc(25px + env(safe-area-inset-bottom)); 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 1.1rem; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            transition: active 0.1s;
        }
        
        button:active { opacity: 0.7; }

        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #downloadBtn { background: #007aff; color: white; display: none; }
        
        #report { 
            background: #fff; 
            color: #000; 
            padding: 12px; 
            border-radius: 10px; 
            text-align: left; 
            display: none; 
            font-size: 0.9rem; 
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="container">
    <div class="timer-overlay">⏱ <span id="timerDisplay">0.00</span>s<br>👣 <span id="stepDisplay">0</span></div>
    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始錄影與分析</button>
    <button id="stopBtn">⏹ 停止並生成結果</button>
    
    <div id="report">
        <div id="reportContent"></div>
    </div>
    
    <button id="downloadBtn">📥 下載本次分析影片</button>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const reportDiv = document.getElementById('report');

let stepCount = 0, lastLeading = null, startTime = 0, isRecording = false, timerInterval;
let mediaRecorder, recordedChunks = [];
const THRESHOLD = 0.11, DISTANCE = 10.0;

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

pose.onResults((results) => {
    // 動態調整畫布解析度以符合影片
    if (results.image) {
        canvas.width = results.image.width;
        canvas.height = results.image.height;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        
        if (results.poseLandmarks) {
            if (isRecording) {
                const lAnkle = results.poseLandmarks[27], rAnkle = results.poseLandmarks[28];
                const dist = Math.abs(lAnkle.x - rAnkle.x);
                if (dist > THRESHOLD) {
                    let currentLeading = lAnkle.x > rAnkle.x ? "L" : "R";
                    if (currentLeading !== lastLeading) {
                        stepCount++;
                        lastLeading = currentLeading;
                        document.getElementById('stepDisplay').innerText = stepCount;
                    }
                }
            }
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        }
        ctx.restore();
    }
});

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: 30 }, audio: false })
    .then(stream => {
        video.srcObject = stream;
        video.play();
        const recordStream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'video/mp4;codecs=avc1' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        
        async function loop() { await pose.send({image: video}); requestAnimationFrame(loop); }
        video.onloadedmetadata = loop;
    });

startBtn.onclick = () => {
    isRecording = true; stepCount = 0; recordedChunks = []; lastLeading = null;
    startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; downloadBtn.style.display = 'none';
    mediaRecorder.start();
    timerInterval = setInterval(() => {
        document.getElementById('timerDisplay').innerText = ((performance.now() - startTime)
