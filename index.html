<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 步態儀 - 修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 錄影畫面固定區域 */
        #video_area { position: relative; width: 100%; height: 50vh; background: #111; flex-shrink: 0; }
        #input_video { display: none; }
        #output_canvas { width: 100%; height: 100%; object-fit: contain; }

        /* 數據與按鈕區 */
        .controls { 
            flex: 1; 
            background: #1c1c1e; 
            padding: 15px; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            overflow-y: auto;
        }

        .timer-overlay { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); 
            padding: 8px; border-radius: 5px; border: 1px solid #34c759; font-size: 0.9rem; z-index: 10;
        }

        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #downloadBtn { background: #007aff; color: white; display: none; margin-top: auto; }
        
        #report { background: #fff; color: #000; padding: 12px; border-radius: 10px; text-align: left; display: none; line-height: 1.4; font-size: 0.95rem; }
    </style>
</head>
<body>

<div id="video_area">
    <div class="timer-overlay">⏱ <span id="timerDisplay">0.00</span>s | 👣 <span id="stepDisplay">0</span></div>
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始錄影與分析</button>
    <button id="stopBtn">⏹ 停止並生成結果</button>
    
    <div id="report">
        <div id="reportContent"></div>
    </div>
    
    <button id="downloadBtn">📥 下載本次分析影片</button>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const reportDiv = document.getElementById('report');

let stepCount = 0, lastLeading = null, startTime = 0, isRecording = false, timerInterval;
let mediaRecorder, recordedChunks = [];
const THRESHOLD = 0.11, DISTANCE = 10.0;

// 初始化 MediaPipe
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults((results) => {
    // 關鍵修正：動態同步畫布與影片解析度
    if (results.image) {
        canvas.width = results.image.width;
        canvas.height = results.image.height;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        
        if (results.poseLandmarks && isRecording) {
            const lAnkle = results.poseLandmarks[27], rAnkle = results.poseLandmarks[28];
            const dist = Math.abs(lAnkle.x - rAnkle.x);
            if (dist > THRESHOLD) {
                let currentLeading = lAnkle.x > rAnkle.x ? "L" : "R";
                if (currentLeading !== lastLeading) {
                    stepCount++;
                    lastLeading = currentLeading;
                    document.getElementById('stepDisplay').innerText = stepCount;
                }
            }
            drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        }
        ctx.restore();
    }
});

// 相機啟動邏輯
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
        audio: false 
    });
    video.srcObject = stream;
    await video.play();
    
    // 錄影初始化
    const recordStream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'video/mp4;codecs=avc1' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

    // 開始偵測迴圈
    async function detectionLoop() {
        await pose.send({image: video});
        requestAnimationFrame(detectionLoop);
    }
    detectionLoop();
}

setupCamera().catch(err => alert("相機啟動失敗: " + err));

startBtn.onclick = () => {
    isRecording = true; stepCount = 0; recordedChunks = [];
    startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; downloadBtn.style.display = 'none';
    mediaRecorder.start();
    timerInterval = setInterval(() => {
        document.getElementById('timerDisplay').innerText = ((performance.now() - startTime) / 1000).toFixed(2);
    }, 100);
};

stopBtn.onclick = () => {
    isRecording = false; clearInterval(timerInterval);
    mediaRecorder.stop();
    const duration = (performance.now() - startTime) / 1000;
    stopBtn.style.display = 'none'; startBtn.style.display = 'block';
    
    const velocity = DISTANCE / duration;
    const stepLength = stepCount > 0 ? DISTANCE / stepCount : 0;
    const cadence = (stepCount / duration) * 60;

    reportDiv.style.display = 'block';
    downloadBtn.style.display = 'block';
    document.getElementById('reportContent').innerHTML = `
        ⏱ 時間：${duration.toFixed(2)} 秒 | 👣 步數：${stepCount}<br>
        🚀 速度：${velocity.toFixed(2)} m/s<br>
        📏 步長：${stepLength.toFixed(2)} m | ⚙️ 步頻：${cadence.toFixed(1)}
    `;

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const videoURL = URL.createObjectURL(blob);
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = videoURL; a.download = `Gait_${Date.now()}.mp4`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
    };
};
</script>
</body>
</html>
