<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 臨床步態儀</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #video_area { position: relative; width: 100%; height: 50vh; background: #000; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .timer-box { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 5px; border: 1px solid #34c759; z-index: 10; font-family: monospace; }
        .controls { flex: 1; background: #1c1c1e; padding: 15px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #downloadBtn { background: #007aff; color: white; display: none; margin-top: auto; }
        #report { background: #fff; color: #000; padding: 12px; border-radius: 10px; text-align: left; display: none; font-size: 0.95rem; }
    </style>
</head>
<body>

<div id="video_area">
    <div class="timer-box">⏱ <span id="timerDisplay">0.00</span>s | 👣 <span id="stepDisplay">0</span></div>
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始測試</button>
    <button id="stopBtn">⏹ 停止並看報告</button>
    <div id="report"><div id="reportContent"></div></div>
    <button id="downloadBtn">📥 儲存分析影片</button>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const reportDiv = document.getElementById('report');

let stepCount = 0, lastLeading = null, startTime = 0, isRecording = false;
let mediaRecorder, recordedChunks = [];
const THRESHOLD = 0.11, DISTANCE = 10.0;

// 1. 初始化 Pose 引擎
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
pose.onResults(onResults);

function onResults(results) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (results.poseLandmarks && isRecording) {
        const lAnkle = results.poseLandmarks[27], rAnkle = results.poseLandmarks[28];
        const dist = Math.abs(lAnkle.x - rAnkle.x);
        if (dist > THRESHOLD) {
            let currentLeading = lAnkle.x > rAnkle.x ? "L" : "R";
            if (currentLeading !== lastLeading) {
                stepCount++;
                lastLeading = currentLeading;
                document.getElementById('stepDisplay').innerText = stepCount;
            }
        }
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
    }
    ctx.restore();
}

// 2. 啟動相機 (iOS 關鍵)
async function init() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: 640, height: 480 }, 
            audio: false 
        });
        video.srcObject = stream;
        
        // 錄影設定
        const recordStream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'video/mp4' });
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);

        // 啟動分析迴圈
        async function run() {
            if (video.readyState >= 2) { await pose.send({image: video}); }
            requestAnimationFrame(run);
        }
        run();
    } catch (e) {
        alert("相機啟動錯誤: " + e.message);
    }
}

init();

startBtn.onclick = () => {
    isRecording = true; stepCount = 0; recordedChunks = [];
    startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; downloadBtn.style.display = 'none';
    mediaRecorder.start();
    
    const timerTick = () => {
        if(!isRecording) return;
        document.getElementById('timerDisplay').innerText = ((performance.now() - startTime) / 1000).toFixed(2);
        requestAnimationFrame(timerTick);
    };
    timerTick();
};

stopBtn.onclick = () => {
    isRecording = false;
    mediaRecorder.stop();
    const duration = (performance.now() - startTime) / 1000;
    stopBtn.style.display = 'none'; startBtn.style.display = 'block';
    
    const velocity = DISTANCE / duration;
    const stepLength = stepCount > 0 ? DISTANCE / stepCount : 0;
    const cadence = (stepCount / duration) * 60;

    reportDiv.style.display = 'block';
    downloadBtn.style.display = 'block';
    document.getElementById('reportContent').innerHTML = `
        <strong>分析成功</strong><br>
        ⏱ 時間：${duration.toFixed(2)}s | 👣 步數：${stepCount}<br>
        🚀 速度：${velocity.toFixed(2)} m/s<br>
        📏 步長：${stepLength.toFixed(2)} m | ⚙️ 步頻：${cadence.toFixed(1)}
    `;

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = url; a.download = `Gait_${Date.now()}.mp4`;
            a.click();
        };
    };
};
</script>
</body>
</html>
