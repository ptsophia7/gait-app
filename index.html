<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10MWT 專業步態分析</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #000; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; }
        #container { position: relative; width: 100vw; height: 60vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .timer-overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 1.2rem; border: 2px solid #00ff00; z-index: 100; color: #fff; }
        .controls { height: 40vh; padding: 20px; background: #1c1c1e; box-sizing: border-box; }
        button { width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 12px; transition: 0.2s; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #downloadBtn { background: #007aff; color: white; display: none; }
        #report { background: #fff; color: #000; padding: 15px; border-radius: 12px; text-align: left; display: none; margin-top: 5px; font-size: 1rem; line-height: 1.5; }
    </style>
</head>
<body>

<div id="container">
    <div class="timer-overlay">秒數: <span id="timerDisplay">0.00</span>s<br>步數: <span id="stepDisplay">0</span></div>
    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始錄影與分析</button>
    <button id="stopBtn">⏹ 停止並生成結果</button>
    
    <div id="report">
        <div id="reportContent"></div>
        <button id="downloadBtn">📥 儲存分析影片 (點擊後請稍候)</button>
    </div>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const reportDiv = document.getElementById('report');

let stepCount = 0, lastLeading = null, startTime = 0, isRecording = false, timerInterval;
let mediaRecorder, recordedChunks = [];
const THRESHOLD = 0.11, DISTANCE = 10.0;

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

pose.onResults((results) => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (results.poseLandmarks) {
        if (isRecording) {
            const lAnkle = results.poseLandmarks[27], rAnkle = results.poseLandmarks[28];
            const dist = Math.abs(lAnkle.x - rAnkle.x);
            if (dist > THRESHOLD) {
                let currentLeading = lAnkle.x > rAnkle.x ? "L" : "R";
                if (currentLeading !== lastLeading) {
                    stepCount++;
                    lastLeading = currentLeading;
                    document.getElementById('stepDisplay').innerText = stepCount;
                }
            }
        }
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
        drawLandmarks(ctx, [results.poseLandmarks[27], results.poseLandmarks[28]], {color: '#FF3B30', radius: 5});
    }
    ctx.restore();
});

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: 30 }, audio: false })
    .then(stream => {
        video.srcObject = stream;
        video.play();
        const recordStream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'video/mp4;codecs=avc1' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        
        async function loop() { await pose.send({image: video}); requestAnimationFrame(loop); }
        video.onloadedmetadata = loop;
    });

startBtn.onclick = () => {
    isRecording = true; stepCount = 0; recordedChunks = []; lastLeading = null;
    startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; downloadBtn.style.display = 'none';
    mediaRecorder.start();
    timerInterval = setInterval(() => {
        document.getElementById('timerDisplay').innerText = ((performance.now() - startTime) / 1000).toFixed(2);
    }, 100);
};

stopBtn.onclick = () => {
    isRecording = false; clearInterval(timerInterval);
    const duration = (performance.now() - startTime) / 1000;
    mediaRecorder.stop();
    stopBtn.style.display = 'none'; startBtn.style.display = 'block';
    
    // 計算數據
    const velocity = DISTANCE / duration;
    const stepLength = stepCount > 0 ? DISTANCE / stepCount : 0;
    const cadence = (stepCount / duration) * 60;

    reportDiv.style.display = 'block';
    downloadBtn.style.display = 'block';
    document.getElementById('reportContent').innerHTML = `
        <strong>【10MWT 報告】</strong><br>
        ⏱ 時間：${duration.toFixed(2)} 秒<br>
        👣 步數：${stepCount} 步<br>
        🚀 速度：${velocity.toFixed(2)} m/s<br>
        📏 步長：${stepLength.toFixed(2)} 公尺<br>
        ⚙️ 步頻：${cadence.toFixed(1)} steps/min
    `;

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const videoURL = URL.createObjectURL(blob);
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = videoURL;
            a.download = `Gait_Test.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    };
};
</script>
</body>
</html>
