<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 臨床系統 V14.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #video_area { position: relative; width: 100%; height: 50vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; border: 1px solid #34c759; z-index: 10; font-family: monospace; }
        .controls { flex: 1; background: #1c1c1e; padding: 15px 20px calc(25px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2e; color: #fff; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #report { background: #fff; color: #333; padding: 20px; border-radius: 12px; display: none; font-size: 0.95rem; line-height: 1.6; text-align: left; }
        .notice-banner { background: #ff453a; color: white; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 10px; font-size: 0.9rem; }
        .init-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .trial-record { background: #f8f9fa; border: 1px solid #e0e0e0; padding: 12px; border-radius: 8px; margin: 10px 0; font-size: 0.85rem; text-align: left; }
        .trial-item { display: flex; justify-content: flex-start; gap: 15px; border-bottom: 1px solid #eee; padding: 5px 0; }
        .result-card { border-left: 6px solid #007aff; padding-left: 15px; margin: 15px 0; background: #f0f7ff; padding: 12px; border-radius: 0 8px 8px 0; text-align: left; }
        .ref-footer { font-size: 0.8rem; color: #8e8e93; margin-top: 15px; text-align: left; border-top: 1px solid #eee; padding-top: 5px; }
    </style>
</head>
<body>

<div id="initScreen" class="init-screen">
    <div class="notice-banner">提示：需先開啟「螢幕錄影」才能儲存錄影檔</div>
    <h2 style="margin-top:0;">10MWT 臨床診斷系統</h2>
    <input type="text" id="patientIdInput" placeholder="請輸入病歷號 (Chart No.)" style="margin-bottom: 10px;">
    <select id="trialCountSelect" style="margin-bottom: 20px;">
        <option value="1">單次測試</option>
        <option value="2">測試 2 次 (取平均值)</option>
        <option value="3" selected>測試 3 次 (取平均值)</option>
    </select>
    <button onclick="startSystem()" style="background:#007aff; color:white; width:100%;">啟動評估相機</button>
</div>

<div id="video_area">
    <div class="overlay">
        <span id="trialDisplay" style="color:#34c759; font-weight:bold;">準備就緒</span><br>
        ⏱ <span id="timerDisplay" style="font-size:1.4rem;">0.00</span> s
    </div>
    <video id="input_video" playsinline muted autoplay></video>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始計時</button>
    <button id="stopBtn">⏹ 停止計時</button>
    
    <div id="stepInputArea" style="display:none; background:#2c2c2e; padding:15px; border-radius:10px;">
        <label id="stepLabel" style="color:#34c759; font-weight:bold;"></label>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="number" id="manualSteps" placeholder="請輸入步數" pattern="\d*">
            <button onclick="recordTrial()" style="background:#007aff; width:40%; padding:10px;">確定</button>
        </div>
    </div>

    <div id="report">
        <div id="reportContent"></div>
        <button id="emailBtn" style="background:#007aff; color:white; margin-top:10px;">📧 寄送測試數據</button>
        <button onclick="location.reload()" style="background:#8e8e93; color:white; margin-top:10px; padding:10px;">下一位患者評估</button>
    </div>
</div>

<script>
const video = document.getElementById('input_video');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const reportDiv = document.getElementById('report');
const stepInputArea = document.getElementById('stepInputArea');

let startTime = 0, isRecording = false;
let currentTrial = 1, totalTrials = 1;
let trialData = []; 
const DISTANCE = 10.0;

async function startSystem() {
    totalTrials = parseInt(document.getElementById('trialCountSelect').value);
    document.getElementById('initScreen').style.display = 'none';
    document.getElementById('trialDisplay').innerText = `Round: 1 / ${totalTrials}`;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
    video.srcObject = stream;
}

startBtn.onclick = () => {
    isRecording = true; startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; stepInputArea.style.display = 'none';
    const tick = () => { if(!isRecording) return; document.getElementById('timerDisplay').innerText = ((performance.now() - startTime) / 1000).toFixed(2); requestAnimationFrame(tick); };
    tick();
};

stopBtn.onclick = () => {
    isRecording = false;
    let dur = (performance.now() - startTime) / 1000;
    trialData.push({ duration: dur });
    stopBtn.style.display = 'none';
    stepInputArea.style.display = 'block';
    document.getElementById('stepLabel').innerText = `第 ${currentTrial} 次測試結束，步數：`;
};

function recordTrial() {
    const s = parseFloat(document.getElementById('manualSteps').value) || 0;
    trialData[currentTrial - 1].steps = s;
    document.getElementById('manualSteps').value = "";

    if (currentTrial < totalTrials) {
        currentTrial++;
        document.getElementById('trialDisplay').innerText = `Round: ${currentTrial} / ${totalTrials}`;
        stepInputArea.style.display = 'none';
        startBtn.style.display = 'block';
        document.getElementById('timerDisplay').innerText = "0.00";
    } else {
        showFinalReport();
    }
}

function showFinalReport() {
    const pid = document.getElementById('patientIdInput').value || "未標註";
    const avgDur = trialData.reduce((a, b) => a + b.duration, 0) / totalTrials;
    const avgSteps = trialData.reduce((a, b) => a + b.steps, 0) / totalTrials;
    const avgVel = DISTANCE / avgDur;
    
    let amb = avgVel < 0.4 ? "居家行走 (Household)" : (avgVel <= 0.8 ? "受限社區行走 (Limited Community)" : "社區行走 (Community)");

    let trialsHTML = trialData.map((d, i) => `
        <div class="trial-item">
            <span>T${i+1}:</span>
            <b>${d.duration.toFixed(2)} s | ${d.steps} 步 | ${(DISTANCE/d.duration).toFixed(2)} m/s</b>
        </div>
    `).join('');

    let reportHTML = `
        <div style="font-size:0.8rem; color:#8e8e93; text-align:left;">病歷號：${pid}</div>
        
        <div class="trial-record">
            <div style="color:#007aff; font-weight:bold; margin-bottom:5px;">個別測試成績：</div>
            ${trialsHTML}
        </div>
        
        <div class="result-card">
            <div style="font-size:1.15rem; font-weight:bold;">平均步速：${avgVel.toFixed(2)} m/s</div>
            <div style="font-size:1.05rem;">移動分級：${amb}</div>
        </div>
        
        <div style="font-weight:bold; color:${avgVel < 0.7 ? '#ff453a' : '#34c759'}; margin-bottom:12px; text-align:left;">
            ${avgVel < 0.7 ? '⚠️ 高跌倒/住院風險 (< 0.7 m/s)' : '✅ 跌倒風險低於警戒值'}
        </div>

        <div style="font-size:0.9rem; border-top:1px solid #eee; padding-top:10px; text-align:left;">
            👣 平均步頻：${((avgSteps/avgDur)*60).toFixed(1)} steps/min<br>
            📏 平均步長：${(DISTANCE/avgSteps).toFixed(2)} m/step
        </div>

        <div class="ref-footer">Reference: Physiopedia</div>
    `;
    
    document.getElementById('reportContent').innerHTML = reportHTML;
    stepInputArea.style.display = 'none';
    reportDiv.style.display = 'block';

    document.getElementById('emailBtn').onclick = () => {
        const mailBody = `10MWT 臨床報告\n病歷號：${pid}\n平均速度：${avgVel.toFixed(2)} m/s\n分級：${amb}\n\n明細：\n${trialData.map((d,i)=>`T${i+1}: ${d.duration.toFixed(2)}s, ${d.steps}步, ${(DISTANCE/d.duration).toFixed(2)}m/s`).join('\n')}\n\nReference: Physiopedia`;
        window.location.href = `mailto:?subject=10MWT_Report_${pid}&body=${encodeURIComponent(mailBody)}`;
    };
}
</script>
</body>
</html>
