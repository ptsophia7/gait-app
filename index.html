<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 臨床診斷系統 V9.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #video_area { position: relative; width: 100%; height: 45vh; background: #000; flex-shrink: 0; border-bottom: 2px solid #333; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #34c759; z-index: 10; font-family: monospace; font-size: 1.1rem; }
        .controls { flex: 1; background: #1c1c1e; padding: 15px 20px calc(25px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2c2c2e; color: #fff; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #report { background: #fff; color: #333; padding: 20px; border-radius: 12px; display: none; font-size: 0.95rem; line-height: 1.6; }
        .notice { color: #ff453a; font-size: 0.85rem; text-align: center; margin-bottom: 10px; font-weight: bold; }
        .init-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .result-box { border-left: 6px solid #007aff; padding-left: 15px; margin: 10px 0; background: #f0f7ff; padding: 10px; border-radius: 0 8px 8px 0; }
        .norm-content { font-size: 0.8rem; color: #444; background: #f2f2f7; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="initScreen" class="init-screen">
    <h2>10MWT 臨床診斷系統</h2>
    <p class="notice">⚠️ 請先開啟「螢幕錄影」</p>
    <input type="text" id="patientIdInput" placeholder="請輸入病歷號 (Chart No.)" style="margin-bottom: 10px;">
    <select id="trialCountSelect" style="margin-bottom: 15px;">
        <option value="1">測試 1 次</option>
        <option value="2">測試 2 次 (取平均)</option>
        <option value="3" selected>測試 3 次 (取平均)</option>
    </select>
    <button onclick="startSystem()" style="background:#007aff; color:white;">進入測試介面</button>
</div>

<div id="video_area">
    <div class="overlay">
        <span id="trialDisplay">準備中</span><br>
        ⏱ <span id="timerDisplay">0.00</span>s
    </div>
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始測試</button>
    <button id="stopBtn">⏹ 停止並輸入步數</button>
    
    <div id="stepInputArea" style="display:none; background:#2c2c2e; padding:15px; border-radius:10px;">
        <label id="stepLabel" style="color:#34c759; font-weight:bold;"></label>
        <div style="display:flex; gap:10px; margin-top:8px;">
            <input type="number" id="manualSteps" placeholder="請輸入步數">
            <button onclick="recordTrial()" style="background:#007aff; width:40%; padding:10px;">確認</button>
        </div>
    </div>

    <div id="report">
        <div id="reportContent"></div>
        <button id="emailBtn" style="background:#007aff; color:white; margin-top:10px;">📧 寄送報告至 Email</button>
        <button onclick="location.reload()" style="background:#8e8e93; color:white; margin-top:10px; padding:10px;">重新開始新病歷</button>
    </div>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const reportDiv = document.getElementById('report');
const stepInputArea = document.getElementById('stepInputArea');

let startTime = 0, isRecording = false;
let currentTrial = 1, totalTrials = 1;
let trialResults = []; // 儲存每次的 {duration, steps}
const DISTANCE = 10.0;

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
pose.onResults((results) => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.save(); ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    if (results.poseLandmarks) drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
    ctx.restore();
});

async function startSystem() {
    totalTrials = parseInt(document.getElementById('trialCountSelect').value);
    document.getElementById('initScreen').style.display = 'none';
    document.getElementById('trialDisplay').innerText = `第 1 / ${totalTrials} 次測試`;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
    video.srcObject = stream;
    async function detect() { if (video.readyState >= 2) await pose.send({image: video}); requestAnimationFrame(detect); }
    detect();
}

startBtn.onclick = () => {
    isRecording = true; startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; stepInputArea.style.display = 'none';
    const tick = () => { if(!isRecording) return; document.getElementById('timerDisplay').innerText = ((performance.now() - startTime) / 1000).toFixed(2); requestAnimationFrame(tick); };
    tick();
};

stopBtn.onclick = () => {
    isRecording = false;
    let duration = (performance.now() - startTime) / 1000;
    trialResults.push({ duration: duration });
    stopBtn.style.display = 'none';
    stepInputArea.style.display = 'block';
    document.getElementById('stepLabel').innerText = `第 ${currentTrial} 次測試完成，請輸入步數：`;
};

function recordTrial() {
    const steps = parseFloat(document.getElementById('manualSteps').value) || 0;
    trialResults[currentTrial - 1].steps = steps;
    document.getElementById('manualSteps').value = "";

    if (currentTrial < totalTrials) {
        currentTrial++;
        document.getElementById('trialDisplay').innerText = `第 ${currentTrial} / ${totalTrials} 次測試`;
        stepInputArea.style.display = 'none';
        startBtn.style.display = 'block';
        document.getElementById('timerDisplay').innerText = "0.00";
    } else {
        generateFinalReport();
    }
}

function generateFinalReport() {
    const patientId = document.getElementById('patientIdInput').value || "N/A";
    let avgDur = trialResults.reduce((a, b) => a + b.duration, 0) / totalTrials;
    let avgSteps = trialResults.reduce((a, b) => a + b.steps, 0) / totalTrials;
    let avgVel = DISTANCE / avgDur;
    let avgCadence = (avgSteps / avgDur) * 60;
    let avgStepLen = DISTANCE / avgSteps;

    let ambClass = avgVel < 0.4 ? "居家行走" : (avgVel <= 0.8 ? "受限社區行走" : "社區行走");
    let fallRisk = avgVel < 0.7 ? "⚠️ 高跌倒/住院風險" : "✅ 跌倒風險較低";

    let reportHTML = `
        <div style="font-size:0.8rem; color:#8e8e93;">病歷號：${patientId} (測試次數: ${totalTrials})</div>
        <div class="result-box">
            <b>平均步速：${avgVel.toFixed(2)} m/s</b><br>
            <b>功能分級：${ambClass}</b>
        </div>
        <div style="font-weight:bold; color:${avgVel < 0.7 ? '#ff453a' : '#34c759'};">${fallRisk}</div>
        <hr>
        👣 平均步頻：${avgCadence.toFixed(1)} steps/min<br>
        📏 平均步長：${avgStepLen.toFixed(2)} m/step
        <div class="norm-content">
            <b>【Reference: Physiopedia / ANPT】</b><br>
            • 中風速度切點: <0.4(居家), 0.4-0.8(受限社區), >0.8(社區)<br>
            • 老年人步速 <0.7 m/s 與健康衰退顯著相關。<br>
            • 70歲常模: 男 1.26 / 女 1.13 m/s
        </div>
    `;
    
    document.getElementById('reportContent').innerHTML = reportHTML;
    stepInputArea.style.display = 'none';
    reportDiv.style.display = 'block';

    document.getElementById('emailBtn').onclick = () => {
        const body = `10MWT 報告\n病歷號：${patientId}\n平均速度：${avgVel.toFixed(2)} m/s\n分級：${ambClass}\n步頻：${avgCadence.toFixed(1)}\n步長：${avgStepLen.toFixed(2)}`;
        window.location.href = `mailto:?subject=步態分析報告_${patientId}&body=${encodeURIComponent(body)}`;
    };
}
</script>
</body>
</html>
