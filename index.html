<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 臨床步態分析系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #video_area { position: relative; width: 100%; height: 42vh; background: #000; flex-shrink: 0; }
        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }
        .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 5px; border: 1px solid #34c759; z-index: 10; font-family: monospace; }
        
        .controls { 
            flex: 1; 
            background: #1c1c1e; 
            padding: 15px 20px calc(25px + env(safe-area-inset-bottom)); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            overflow-y: auto;
        }

        button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #downloadBtn { background: #007aff; color: white; display: none; margin-top: 5px; }
        
        #report { 
            background: #fff; color: #333; padding: 15px; border-radius: 10px; 
            display: none; font-size: 0.95rem; line-height: 1.5;
            border-left: 6px solid #007aff;
        }
        .norm-label { font-size: 0.8rem; color: #666; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
        .init-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="initScreen" class="init-screen">
    <h2 style="margin-bottom: 20px;">10MWT 步態分析系統</h2>
    <button onclick="startSystem()" style="background:#007aff; color:white; width:80%;">點擊啟動相機</button>
</div>

<div id="video_area">
    <div class="overlay">⏱ <span id="timerDisplay">0.00</span>s | 👣 <span id="stepDisplay">0</span></div>
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始 10 公尺測試</button>
    <button id="stopBtn">⏹ 停止並生成報告</button>
    
    <div id="report">
        <div id="reportContent"></div>
        <div class="norm-label">
            <strong>臨床常模對照 (Gait Speed):</strong><br>
            • > 0.8 m/s: 社區獨立行走<br>
            • 0.4 - 0.8 m/s: 社區行走受限<br>
            • < 0.4 m/s: 居家行走級別
        </div>
    </div>
    
    <button id="downloadBtn">📥 儲存本次分析影片</button>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const reportDiv = document.getElementById('report');

let stepCount = 0, lastLeading = null, startTime = 0, isRecording = false;
let mediaRecorder, recordedChunks = [];
const DISTANCE = 10.0; 

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
pose.onResults((results) => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    if (results.poseLandmarks) {
        if (isRecording) {
            const lAnkle = results.poseLandmarks[27], rAnkle = results.poseLandmarks[28];
            const dist = Math.abs(lAnkle.x - rAnkle.x);
            if (dist > 0.11) {
                let currentLeading = lAnkle.x > rAnkle.x ? "L" : "R";
                if (currentLeading !== lastLeading) { stepCount++; lastLeading = currentLeading; document.getElementById('stepDisplay').innerText = stepCount; }
            }
        }
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
    }
    ctx.restore();
});

async function startSystem() {
    document.getElementById('initScreen').style.display = 'none';
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
    video.srcObject = stream;
    const recordStream = canvas.captureStream(30);
    mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'video/mp4;codecs=avc1' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    async function detect() { if (video.readyState >= 2) await pose.send({image: video}); requestAnimationFrame(detect); }
    detect();
}

startBtn.onclick = () => {
    isRecording = true; stepCount = 0; recordedChunks = []; startTime = performance.now();
    startBtn.style.display = 'none'; stopBtn.style.display = 'block';
    reportDiv.style.display = 'none'; downloadBtn.style.display = 'none';
    mediaRecorder.start();
    const tick = () => { if(!isRecording) return; document.getElementById('timerDisplay').innerText = ((performance.now() - startTime) / 1000).toFixed(2); requestAnimationFrame(tick); };
    tick();
};

stopBtn.onclick = () => {
    isRecording = false; 
    mediaRecorder.stop();
    const duration = (performance.now() - startTime) / 1000;
    stopBtn.style.display = 'none'; startBtn.style.display = 'block';
    
    const velocity = DISTANCE / duration;
    const stepLength = stepCount > 0 ? (DISTANCE / stepCount) : 0;
    const cadence = (stepCount / duration) * 60;
    
    // 常模判定邏輯
    let status = "✅ 社區獨立行走";
    let statusColor = "#2ed573";
    if (velocity < 0.8) { status = "⚠️ 社區行走受限"; statusColor = "#ffa502"; }
    if (velocity < 0.4) { status = "❌ 居家行走級別"; statusColor = "#ff4757"; }

    reportDiv.style.display = 'block'; 
    downloadBtn.style.display = 'block';
    
    document.getElementById('reportContent').innerHTML = `
        <div style="font-size:1.15rem; font-weight:bold; color:${statusColor}; margin-bottom:10px;">${status}</div>
        ⏱ 時間：<strong>${duration.toFixed(2)}</strong> s<br>
        🚀 速度：<strong>${velocity.toFixed(2)}</strong> m/s<br>
        👣 步數：${stepCount} 步<br>
        📏 步長：${stepLength.toFixed(2)} m/step<br>
        ⚙️ 步頻：${cadence.toFixed(1)} steps/min
    `;
    
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const videoURL = URL.createObjectURL(blob);
        downloadBtn.onclick = () => {
            // iOS 最佳儲存方案：在新視窗打開
            const win = window.open(videoURL, '_blank');
            if(!win) alert("請允許彈出視窗以儲存影片");
        };
    };
};
</script>
</body>
</html>
