<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>10MWT 專業步態分析</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #000; color: white; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #container { position: relative; width: 100vw; height: 55vh; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        .timer-overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 1.1rem; border: 2px solid #34c759; z-index: 100; color: #fff; }
        
        /* 調整控制區高度，並增加下方邊距避免被遮擋 */
        .controls { 
            height: 45vh; 
            padding: 15px 20px calc(20px + env(safe-area-inset-bottom)); 
            background: #1c1c1e; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button { width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 12px; border: none; font-weight: bold; transition: 0.2s; flex-shrink: 0; }
        #startBtn { background: #34c759; color: white; }
        #stopBtn { background: #ff3b30; color: white; display: none; }
        #downloadBtn { background: #007aff; color: white; display: none; margin-top: 5px; }
        
        /* 報告區塊增加最大高度限制，防止撐爆畫面 */
        #report { 
            background: #fff; 
            color: #000; 
            padding: 12px; 
            border-radius: 10px; 
            text-align: left; 
            display: none; 
            font-size: 0.95rem; 
            line-height: 1.4;
            overflow-y: auto; 
            flex-grow: 1; 
        }
        .norm-hint { font-size: 0.8rem; color: #666; border-top: 1px solid #eee; margin-top: 8px; padding-top: 5px; }
    </style>
</head>
<body>

<div id="container">
    <div class="timer-overlay">⏱ <span id="timerDisplay">0.00</span>s<br>👣 <span id="stepDisplay">0</span></div>
    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
</div>

<div class="controls">
    <button id="startBtn">🔴 開始錄影與分析</button>
    <button id="stopBtn">⏹ 停止並生成結果</button>
    
    <div id="report">
        <div id="reportContent"></div>
        <div class="norm-hint">常模：社區獨立行走需 > 0.8 m/s；安全過馬路需 > 1.2 m/s</div>
    </div>
    
    <button id="downloadBtn">📥 下載本次分析影片</button>
</div>

<script>
const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const downloadBtn = document.getElementById('downloadBtn');
const reportDiv = document.getElementById('report');

let stepCount = 0, lastLeading = null, startTime = 0, isRecording = false, timerInterval;
let mediaRecorder, recordedChunks = [];
const THRESHOLD = 0.11, DISTANCE = 10.0;

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

pose.onResults((results) => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    if (results.poseLandmarks && isRecording) {
        const lAnkle = results.poseLandmarks[27], rAnkle = results.poseLandmarks[28];
        const dist = Math.abs(lAnkle.x - rAnkle.x);
        if (dist > THRESHOLD) {
            let currentLeading = lAnkle.x > rAnkle.x ? "L" : "R";
            if (currentLeading !== lastLeading) {
                stepCount++;
                lastLeading = currentLeading;
                document.getElementById('stepDisplay').innerText = stepCount;
            }
        }
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
    }
    ctx.restore();
});

navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: 30 }, audio: false })
    .then(stream => {
        video.srcObject = stream;
        video.play();
        const recordStream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(recordStream, { mimeType: 'video/mp4;codecs=avc1' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        
        async function loop() { await pose.send({image: video}); requestAnimationFrame(loop); }
        video.onloadedmetadata = loop;
    });
